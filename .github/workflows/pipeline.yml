name: Build and Push IaC Toolbox

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        env:
            # Future-proofing the runner for the 2026 Node.js migration
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
            GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Run Build
              run: make build

            - name: Run Smoke Tests
              # If any command in 'make test' returns a non-zero exit code,
              # the pipeline stops here and the push never happens.
              run: make test

            - name: Run Functional Tests (Deep check)
              run: make test-functional

            - name: Run Push
              run: make push
